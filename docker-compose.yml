services:
  postgres:
    image: postgres:16-alpine
    container_name: cozy-budget-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozy
      POSTGRES_PASSWORD: cozy
      POSTGRES_DB: cozy_budget
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozy -d cozy_budget"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
